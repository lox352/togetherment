name: Sync Google Calendar

on:
  schedule:
    # Daily. Scheduled runs can lag or be skipped on quiet repos — use
    # "Run workflow" in the Actions tab for an immediate sync after a swap.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Write service account key
        run: echo "$GCP_SA_KEY" > "$RUNNER_TEMP/sa-key.json"
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      - name: Run sync
        run: npm run sync --workspace=sync
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa-key.json
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          CALENDAR_ID: ${{ vars.CALENDAR_ID }}
